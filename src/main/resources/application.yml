server:
  port: 8080

spring:
  application:
    name: plog-api
  datasource:
    url: ${DATABASE_URL:${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/plog}}
    username: ${DATABASE_USER:${SUPABASE_DB_USER:postgres}}
    password: ${DATABASE_PASSWORD:${SUPABASE_DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# External Services
gemini:
  api-key: ${GEMINI_API_KEY:}

storage:
  s3-endpoint: ${S3_ENDPOINT:${SUPABASE_S3_ENDPOINT:}}
  s3-region: ${S3_REGION:us-east-1}
  s3-bucket: ${S3_BUCKET:${SUPABASE_S3_BUCKET:photos}}
  s3-access-key: ${S3_ACCESS_KEY:${SUPABASE_S3_ACCESS_KEY:}}
  s3-secret-key: ${S3_SECRET_KEY:${SUPABASE_S3_SECRET_KEY:}}

# Logging
logging:
  level:
    com.plog: DEBUG
