spring:
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://your-host:5432/postgres}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:your-password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# AI (Gemini) API 설정
gemini:
  api:
    key: ${GEMINI_API_KEY:your-api-key}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
