server:
  port: 8080

spring:
  application:
    name: plog-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/plog}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      max-lifetime: 1800000
      auto-commit: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# External Services
gemini:
  api-key: ${GEMINI_API_KEY:}

storage:
  s3-endpoint: ${S3_ENDPOINT:${SUPABASE_S3_ENDPOINT:}}
  s3-region: ${S3_REGION:us-east-1}
  s3-bucket: ${S3_BUCKET:${SUPABASE_S3_BUCKET:photos}}
  s3-access-key: ${S3_ACCESS_KEY:${SUPABASE_S3_ACCESS_KEY:}}
  s3-secret-key: ${S3_SECRET_KEY:${SUPABASE_S3_SECRET_KEY:}}

# Logging
logging:
  level:
    com.plog: DEBUG
