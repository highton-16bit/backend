openapi: 3.0.3
info:
  title: VibeLog API (바이브로그)
  description: 나를 가장 행복하게 하는 순간, 있는 그대로의 여행을 기록하고 발견하는 SNS 플랫폼
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버 (ngrok 사용 시 도메인 주소로 변경)
paths:
  /api/v1/auth/login:
    post:
      summary: 초간단 로그인
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "daybreak312"
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: string, format: uuid }
                  username: { type: string }
                  token: { type: string }
  /api/v1/travels:
    get:
      summary: 내 여행 목록 조회
      parameters:
        - name: userId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Travel'
    post:
      summary: 여행 생성
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TravelCreate' }
      responses:
        '201':
          description: 생성 성공
  /api/v1/search/ai:
    get:
      summary: AI 기반 통합 검색
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: AI 답변 및 관련 포스트 반환
components:
  schemas:
    Travel:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        regionName: { type: string, nullable: true }
        isPublic: { type: boolean }
    TravelCreate:
      type: object
      properties:
        title: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        regionName: { type: string, nullable: true }
        isPublic: { type: boolean }
